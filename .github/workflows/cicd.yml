name: Company Portal CI/CD

on:
  push:
    branches: [ main ]

jobs:

  # ==================================
  # CI JOB - Build and Test
  # ==================================

  ci:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    # =========================
    # Backend CI
    # =========================

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: Backend/package-lock.json

    - name: Install Backend Dependencies
      working-directory: Backend
      run: npm ci

    - name: Start Backend
      working-directory: Backend
      run: |
        nohup node server.js > backend.log 2>&1 &
        sleep 10
        echo "===== Backend Log ====="
        cat backend.log || true

    - name: Test Backend
      run: curl --fail http://localhost:3000


    # =========================
    # Frontend CI
    # =========================

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install Frontend Dependencies
      working-directory: Frontend
      run: |
        python -m pip install --upgrade pip
        pip install flask requests

    - name: Start Frontend
      working-directory: Frontend
      run: |
        nohup python3 app.py > frontend.log 2>&1 &
        sleep 10
        echo "===== Frontend Log ====="
        cat frontend.log || true

    - name: Test Frontend
      run: curl --fail http://localhost:5000



  # ==================================
  # CD JOB - Deploy to EC2
  # ==================================

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |

          echo "Starting deployment..."

          APP_DIR=/home/ubuntu/company-portal

          # Clone repo if first deployment
          if [ ! -d "$APP_DIR" ]; then
            echo "Repository not found. Cloning..."
            git clone https://github.com/YOUR_GITHUB_USERNAME/Company-Portal.git $APP_DIR
          fi

          cd $APP_DIR

          echo "Pulling latest code..."
          git pull origin main


          # =========================
          # Backend Deployment
          # =========================

          echo "Installing backend dependencies..."
          cd $APP_DIR/Backend
          npm ci

          echo "Stopping old backend..."
          pkill node || true

          echo "Starting backend..."
          nohup node server.js > backend.log 2>&1 &


          # =========================
          # Frontend Deployment
          # =========================

          echo "Installing frontend dependencies..."
          cd $APP_DIR/Frontend
          pip3 install flask requests

          echo "Stopping old frontend..."
          pkill python3 || true

          echo "Starting frontend..."
          nohup python3 app.py > frontend.log 2>&1 &


          echo "Deployment completed successfully!"