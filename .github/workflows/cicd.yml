name: Company Portal CI/CD

on:
  push:
    branches:
      - main

jobs:

# =========================
# CI JOB
# =========================

  ci:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      # -------------------------
      # Backend CI
      # -------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: Backend
        run: npm install

      - name: Start Backend Server
        working-directory: Backend
        run: |
          echo "Starting backend..."
          nohup node server.js > backend.log 2>&1 &
          sleep 10
          cat backend.log || true

      - name: Test Backend API
        run: |
          echo "Testing backend..."
          curl --fail http://localhost:3000 || exit 1
          echo "Backend test successful"


      # -------------------------
      # Frontend CI
      # -------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Frontend Dependencies
        working-directory: Frontend
        run: |
          python -m pip install --upgrade pip
          pip install flask requests

      - name: Start Frontend Server
        working-directory: Frontend
        run: |
          echo "Starting frontend..."
          nohup python3 app.py > frontend.log 2>&1 &
          sleep 10
          cat frontend.log || true

      - name: Test Frontend
        run: |
          echo "Testing frontend..."
          curl --fail http://localhost:5000 || exit 1
          echo "Frontend test successful"



# =========================
# CD JOB
# =========================

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            echo "Starting deployment..."

            APP_DIR=/home/ubuntu/company-portal

            # Clone repo if not exists
            if [ ! -d "$APP_DIR" ]; then
              echo "Cloning repository..."
              git clone https://github.com/Ajesh-devops/Company-Portal.git $APP_DIR
            fi

            cd $APP_DIR

            echo "Pulling latest code..."
            git pull origin main


            # =========================
            # Backend Deployment
            # =========================

            echo "Deploying Backend..."
            cd $APP_DIR/Backend

            echo "Installing backend dependencies..."
            npm install

            echo "Stopping old backend..."
            pkill -f server.js 2>/dev/null || true

            echo "Starting backend..."
            nohup node server.js > backend.log 2>&1 &


            # =========================
            # Frontend Deployment
            # =========================

            echo "Deploying Frontend..."
            cd $APP_DIR/Frontend

            echo "Installing frontend dependencies..."
            pip3 install flask requests

            echo "Stopping old frontend..."
            pkill -f app.py 2>/dev/null || true

            echo "Starting frontend..."
            nohup python3 app.py > frontend.log 2>&1 &

            echo "Deployment completed successfully!"